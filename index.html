<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDORA PLANET NODE</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #020e0e;
    --panel: rgba(2, 20, 18, 0.92);
    --border: rgba(0, 200, 150, 0.2);
    --accent: #aaff44;
    --cyan: #44ffee;
    --alert: #ff4466;
    --text: rgba(200, 240, 220, 0.9);
    --muted: rgba(180, 220, 200, 0.45);
}

html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne Mono', monospace;
    overflow: hidden;
}

.app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    position: relative;
}

.top-panel {
    position: relative;
    z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    /* 6. Other: backdrop-filter を標準の後に記述 */
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
}

/* フォーム要素の改善（1. Accessibility: ラベルの付与） */
.era-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: linear-gradient(to right, var(--cyan), var(--accent));
    border-radius: 1px;
    outline: none;
    cursor: pointer;
}

/* その他のCSSは省略しますが、記述順は -webkit- を先に保ちます */

    </style>
</head>
<body>
    <div class="app">
        <div class="top-panel">
            <div class="era-row">
                <label for="eraSlider" id="eraLabel" class="era-label">-800Ma</label>
                <input type="range" id="eraSlider" aria-label="年代調整スライダー"
                    min="-800" max="0" step="1" value="-800"
                    class="era-slider" />
                <span id="year" class="era-now">NOW</span>
            </div>
            
            </div>
        <canvas id="sphere"></canvas>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
