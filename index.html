<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDORA PLANET NODE</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="container">

        <!-- canvas: style.css の canvas#sphere に合わせる -->
        <canvas id="sphere"></canvas>

        <!-- 左パネル: .ui-panel + .panel-left -->
        <div class="ui-panel panel-left">

            <!-- .app-header に変更（style.cssに対応するクラス） -->
            <header class="app-header">
                <h1>PANDORA <span>PLANET NODE</span></h1>
                <div class="subtitle">
                    bgf ≈ <span id="year">-800Ma</span> | Aetheria
                </div>
            </header>

            <div class="stats">
                <div class="stat">
                    <span class="label">PHASE</span>
                    <span id="phase" class="value">Pre-Biotic</span>
                </div>
                <div class="stat">
                    <span class="label">Φ DENSITY</span>
                    <span id="phi" class="value">0.0000</span>
                </div>
                <div class="stat">
                    <span class="label">bgf TEMP</span>
                    <span id="temp" class="value">--°C</span>
                </div>
                <div class="stat">
                    <span class="label">STRAIN</span>
                    <span id="strain" class="value">0.00</span>
                </div>
                <div class="stat">
                    <span class="label">STABILITY</span>
                    <span id="stability" class="value">--%</span>
                </div>
                <div class="stat">
                    <span class="label">POPULATION</span>
                    <span id="pop" class="value">--%</span>
                </div>
                <div class="stat">
                    <span class="label">DRIVE</span>
                    <span id="drive" class="value">0.0000</span>
                </div>
            </div>

            <!-- アラートボックス -->
            <div id="alert-box" class="alert-box"></div>

            <button id="runBtn" class="observe-btn">OBSERVE SINGULARITY</button>

            <!-- ログ: style.css の #eventLog に合わせてIDを統一 -->
            <div id="eventLog" class="log"></div>
        </div>

    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
