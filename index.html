<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDORA PLANET NODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #020e0e; --panel: rgba(2, 20, 18, 0.92); --border: rgba(0, 200, 150, 0.2);
            --accent: #aaff44; --cyan: #44ffee; --alert: #ff4466; --text: rgba(200, 240, 220, 0.9); --muted: rgba(180, 220, 200, 0.45);
        }
        html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne Mono', monospace; overflow: hidden; }
        .app { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        .top-panel { position: relative; z-index: 10; background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 14px 8px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .header-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .phase-badge { font-size: 11px; color: var(--cyan); border: 1px solid var(--cyan); padding: 3px 8px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
        .stat-item { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); font-size: 9px; }
        .alert-box { display: none; border: 1px solid var(--alert); color: var(--alert); padding: 4px; margin-bottom: 6px; }
        .alert-box.active { display: block; }
        .era-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .era-slider { flex: 1; height: 2px; background: var(--cyan); }
        /* 復元：ボタン群 */
        .control-row { display: flex; gap: 6px; margin-top: 8px; }
        .speed-btn { padding: 4px 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: inherit; }
        .speed-btn.active { border-color: var(--accent); color: var(--accent); }
        .run-btn { padding: 5px 14px; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; background: transparent; }
        .run-btn.active { background: var(--alert); border-color: var(--alert); color: #fff; }
        #fortress-list { margin-top: 10px; font-size: 10px; color: var(--accent); }
        canvas#sphere { width: 100%; flex: 1; }
        #log { font-size: 8px; color: var(--muted); height: 50px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-panel">
            <div class="header-row">
                <span style="color:var(--accent)">PANDORA</span>
                <span class="phase-badge" id="phase">Pre-Biotic</span>
            </div>
            <div class="stats-grid">
                <div class="stat-item"><span class="label">Φ</span><span id="phi" class="value">0.9500</span></div>
                <div class="stat-item"><span class="label">TEMP</span><span id="temp" class="value">--°C</span></div>
                <div class="stat-item"><span class="label">STRAIN</span><span id="strain" class="value">0.00</span></div>
                <div class="stat-item"><span class="label">STAB</span><span id="stability" class="value">--%</span></div>
                <div class="stat-item"><span class="label">POP</span><span id="pop" class="value">--%</span></div>
                <div class="stat-item"><span class="label">DRIVE</span><span id="drive" class="value">0.0000</span></div>
            </div>
            <div id="alert-box" class="alert-box"></div>
            <div class="era-row">
                <label for="eraSlider" id="eraLabel" class="era-label">-800Ma</label>
                <input type="range" id="eraSlider" min="-800" max="0" value="-800" class="era-slider" />
                <span id="year" class="era-now">NOW</span>
            </div>
            <div class="control-row">
                <div class="speed-btns">
                    <button class="speed-btn active" data-speed="1">×1</button>
                    <button class="speed-btn" data-speed="50">×50</button>
                    <button class="speed-btn" data-speed="100">×100</button>
                    <button class="speed-btn" data-speed="1000">×1K</button>
                </div>
                <button id="runBtn" class="run-btn">▶ OBSERVE SINGULARITY</button>
            </div>
            <div id="fortress-list"></div>
            <div id="log"></div>
        </div>
        <canvas id="sphere"></canvas>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
