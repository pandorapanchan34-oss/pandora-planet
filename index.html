<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANDORA EARTH — Strain World Monitor</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="header-left">
      <div class="logo">PANDORA <em>EARTH</em></div>
      <div class="tagline">STRAIN WORLD MONITOR // MERCATOR MODE</div>
    </div>
    <div class="header-right">
      <div class="hstat">
        <div class="hstat-label">ENGINE</div>
        <div class="hstat-val green" id="hEngineStatus">V10 ONLINE</div>
      </div>
      <div class="hstat">
        <div class="hstat-label">GLOBAL STRAIN</div>
        <div class="hstat-val" id="hGlobalStrain">—</div>
      </div>
      <div class="hstat">
        <div class="hstat-label">PHI</div>
        <div class="hstat-val amber" id="hPhi">—</div>
      </div>
      <div class="hstat">
        <div class="hstat-label">PHASE</div>
        <div class="hstat-val" id="hPhase">—</div>
      </div>
      <div class="clock" id="clock">—</div>
    </div>
  </header>

  <!-- MAP AREA -->
  <div id="mapWrap">
    <canvas id="mapCanvas"></canvas>
    <!-- TOOLTIP -->
    <div id="tooltip" class="tooltip hidden">
      <div class="tt-region" id="ttRegion">—</div>
      <div class="tt-row"><span>Strain</span><span id="ttStrain">—</span></div>
      <div class="tt-row"><span>Anomaly</span><span id="ttAnomaly">—</span></div>
      <div class="tt-row"><span>Phase</span><span id="ttPhase">—</span></div>
    </div>
    <!-- LEGEND -->
    <div class="legend">
      <div class="legend-title">STRAIN LEVEL</div>
      <div class="legend-bar"></div>
      <div class="legend-labels">
        <span>LOW</span><span>MED</span><span>HIGH</span><span>CRIT</span>
      </div>
    </div>
    <!-- BGF INDICATOR -->
    <div class="bgf-indicator">
      bgf critical = <span>19.15</span>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottomPanel">

    <!-- REGION LIST -->
    <div class="panel-section" id="regionPanel">
      <div class="panel-title">REGIONAL STRAIN</div>
      <div id="regionList"></div>
    </div>

    <!-- ENGINE READOUT -->
    <div class="panel-section" id="enginePanel">
      <div class="panel-title">ENGINE STATE</div>
      <div class="engine-grid" id="engineGrid"></div>
    </div>

    <!-- MINI CHART -->
    <div class="panel-section" id="chartPanel">
      <div class="panel-title">STRAIN HISTORY</div>
      <canvas id="historyChart" height="80"></canvas>
    </div>

  </div>

</div>

<!-- SCRIPTS (順番重要) -->
<script src="config.js"></script>
<script src="js/core/Physics.js"></script>
<script src="js/core/Events.js"></script>
<script src="js/core/Engine.js"></script>
<script src="js/visuals/Sphere.js"></script>
<script src="js/ui/Controls.js"></script>
<script src="js/main.js"></script>

</body>
</html>
