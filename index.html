<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDORA PLANET NODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
        :root { --accent: #00ffaa; --bg: #0a0a0f; }
        body { margin:0; background:var(--bg); color:#c8d8d0; font-family:'Syne Mono',monospace; overflow:hidden; height:100vh; }
        .ui { position:absolute; top:20px; left:20px; width:360px; background:rgba(15,18,25,0.96); border:1px solid #334455; border-radius:8px; padding:20px; z-index:100; backdrop-filter:blur(12px); }
        h1 { font-family:'Syne',sans-serif; font-size:26px; margin-bottom:6px; }
        h1 span { color:var(--accent); }
        .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
        .stat { background:rgba(255,255,255,0.04); padding:10px; border-radius:6px; border-left:3px solid var(--accent); }
        button { width:100%; padding:16px; background:#ff3388; color:white; border:none; font-size:15px; font-weight:800; border-radius:6px; cursor:pointer; margin:10px 0; }
        canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
        .log { margin-top:15px; height:180px; overflow:auto; font-size:10px; background:rgba(0,0,0,0.4); padding:10px; border-radius:6px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>PANDORA <span>PLANET NODE</span></h1>
        <div style="font-size:11px; color:#667788;">Aetheria | bgf ≈ 19.15 | 2026</div>
        
        <div class="stats">
            <div class="stat"><div style="font-size:9px;color:#667788;">PHASE</div><div id="phase">Complex → Sapient</div></div>
            <div class="stat"><div style="font-size:9px;color:#667788;">Φ</div><div id="phi">0.906</div></div>
            <div class="stat"><div style="font-size:9px;color:#667788;">TEMP</div><div id="temp">19.2°C</div></div>
            <div class="stat"><div style="font-size:9px;color:#667788;">STRAIN</div><div id="strain">9.12</div></div>
        </div>

        <button id="runBtn">OBSERVE SINGULARITY</button>
        <div class="log" id="log"></div>
    </div>

    <canvas id="sphere"></canvas>

    <script>
        const canvas = document.getElementById('sphere');
        const ctx = canvas.getContext('2d');
        let w, h, time = 0, active = false;

        const state = { phi: 0.82, strain: 5.8, temp: 19.2, phase: "Complex" };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function addLog(msg) {
            const log = document.getElementById('log');
            const d = document.createElement('div');
            d.textContent = `> ${msg}`;
            log.prepend(d);
            if (log.children.length > 10) log.removeChild(log.lastChild);
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            const cx = w/2, cy = h/2;
            const r = Math.min(w, h) * 0.33;

            // 球体
            const pulse = Math.sin(time * 0.003) * (state.phi * 20);
            ctx.shadowBlur = 80;
            ctx.shadowColor = '#00ffcc';
            ctx.strokeStyle = 'rgba(0,255,200,0.4)';
            ctx.lineWidth = 4;
            for (let i = 0; i < 12; i++) {
                const rot = time * 0.0008 + i * 0.52;
                ctx.beginPath();
                ctx.ellipse(cx, cy, r * 1.12, r * 0.85, rot, 0, Math.PI*2);
                ctx.stroke();
            }

            if (active) {
                // 粒子
                for (let i = 0; i < 45; i++) {
                    const t = (time*0.0018 + i) % 2.8;
                    const x = cx + Math.sin(time*0.005 + i) * (r*0.8);
                    const y = cy - r*1.2 + t * r * 2.8;
                    ctx.fillStyle = t < 1.2 ? '#88ffdd' : '#ff6688';
                    ctx.fillRect(x-2.5, y, 5, 5);
                }
            }

            ctx.shadowBlur = 60;
            ctx.shadowColor = '#00ff99';
            ctx.fillStyle = '#112222';
            ctx.beginPath();
            ctx.arc(cx, cy, r*0.36, 0, Math.PI*2);
            ctx.fill();
        }

        function update() {
            if (!active) return;
            state.phi = Math.min(2.2, state.phi + 0.0025);
            state.strain += 0.025;
            state.temp += (state.phi - 0.8) * 0.15;
        }

        function loop() {
            time += 0.016;
            update();
            draw();

            document.getElementById('phi').textContent = state.phi.toFixed(3);
            document.getElementById('temp').textContent = state.temp.toFixed(1) + '°C';
            document.getElementById('strain').textContent = state.strain.toFixed(1);
            document.getElementById('phase').textContent = state.phase;

            requestAnimationFrame(loop);
        }

        document.getElementById('runBtn').addEventListener('click', () => {
            active = !active;
            const btn = document.getElementById('runBtn');
            btn.textContent = active ? "FREEZE FLOW" : "OBSERVE SINGULARITY";
            addLog(active ? "FLOW ACTIVE" : "FLOW FROZEN");
        });

        window.onload = () => {
            addLog("PANDORA PLANET NODE ONLINE");
            addLog("Aetheria awakening...");
            loop();
        };
    </script>
</body>
</html>
